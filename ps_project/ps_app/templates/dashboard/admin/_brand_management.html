<div class="space-y-6">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
        <div>
            <h2 class="text-xs font-bold uppercase tracking-widest text-neutral-400 mb-1">Catalog Architecture</h2>
            <h1 class="text-2xl font-black text-neutral-900 tracking-tight">Brand Control</h1>
        </div>
        <div class="flex items-center gap-3">
            <a href="/brands/add/" class="bg-red-600 hover:bg-red-700 text-white text-xs font-bold uppercase tracking-wider px-4 py-3 rounded-xl transition-all flex items-center gap-2 shadow-lg shadow-red-600/10 active:scale-95">
                <i data-lucide="plus" class="w-4 h-4"></i>
                Add New Brand
            </a>
        </div>
    </div>

    <div class="bg-black border border-neutral-800 rounded-3xl shadow-2xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-neutral-800 text-[10px] font-bold uppercase tracking-widest text-neutral-400 bg-neutral-950/50">
                        <th class="p-4 pl-6">Brand Log</th>
                        <th class="p-4">Slug Identification</th>
                        <th class="p-4">Total Products Loaded</th>
                        <th class="p-4">Performance State</th>
                        <th class="p-4 pr-6 text-right">System Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-neutral-900 text-sm font-semibold text-neutral-300">
                    {% for i in "x"|rjust:"12" %}
                        <tr class="hover:bg-neutral-900/30 transition-colors">
                            <td class="p-4 pl-6 flex items-center gap-3">
                                <div class="w-10 h-10 rounded-xl bg-neutral-900 border border-neutral-800 overflow-hidden flex items-center justify-center text-white font-black italic tracking-tighter text-xs shrink-0">
                                    SONY
                                </div>
                                <div>
                                    <span class="text-white block font-bold">Sony Corporation</span>
                                    <span class="text-[11px] font-mono text-neutral-500 block">Premium Imaging</span>
                                </div>
                            </td>
                            <td class="p-4 font-mono text-xs text-red-500">sony</td>
                            <td class="p-4 font-mono text-sm text-neutral-300">42 Products</td>
                            <td class="p-4">
                                <span class="inline-flex items-center gap-1 bg-green-500/10 text-green-400 text-[10px] font-black uppercase px-2 py-0.5 rounded border border-green-500/20 tracking-wider">
                                    Active
                                </span>
                            </td>
                            <td class="p-4 pr-6 text-right">
                                <div class="flex items-center justify-end gap-2">
                                    <button class="p-2 bg-neutral-900 hover:bg-neutral-800 text-neutral-400 hover:text-white rounded-xl border border-neutral-800 transition-all">
                                        <i data-lucide="edit-3" class="w-4 h-4"></i>
                                    </button>
                                    <button class="p-2 bg-neutral-900 hover:bg-red-600/20 text-neutral-400 hover:text-red-500 rounded-xl border border-neutral-800 hover:border-red-600/30 transition-all">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
