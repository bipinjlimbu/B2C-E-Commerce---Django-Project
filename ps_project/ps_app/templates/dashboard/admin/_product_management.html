<div class="space-y-6">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
        <div>
            <h2 class="text-xs font-bold uppercase tracking-widest text-neutral-400 mb-1">Catalog Architecture</h2>
            <h1 class="text-2xl font-black text-neutral-900 tracking-tight">Product Master</h1>
        </div>
        <div class="flex items-center gap-3">
            <a href="/products/add/" class="bg-red-600 hover:bg-red-700 text-white text-xs font-bold uppercase tracking-wider px-4 py-3 rounded-xl transition-all flex items-center gap-2 shadow-lg shadow-red-600/10 active:scale-95">
                <i data-lucide="plus" class="w-4 h-4"></i>
                Deploy New Product
            </a>
        </div>
    </div>

    <div class="bg-black border border-neutral-800 rounded-3xl shadow-2xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-neutral-800 text-[10px] font-bold uppercase tracking-widest text-neutral-400 bg-neutral-950/50">
                        <th class="p-4 pl-6">Hardware Profile</th>
                        <th class="p-4">SKU / Model</th>
                        <th class="p-4">Brand Asset</th>
                        <th class="p-4">Valuation (Price)</th>
                        <th class="p-4">Stock Metrics</th>
                        <th class="p-4 pr-6 text-right">System Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-neutral-900 text-sm font-semibold text-neutral-300">
                    {% for i in "x"|rjust:"12" %}
                        <tr class="hover:bg-neutral-900/30 transition-colors">
                            <td class="p-4 pl-6 flex items-center gap-3">
                                <div class="w-12 h-12 rounded-xl bg-neutral-900 border border-neutral-800 overflow-hidden flex items-center justify-center text-neutral-500 shrink-0">
                                    <i data-lucide="camera" class="w-5 h-5 text-neutral-600"></i>
                                </div>
                                <div>
                                    <span class="text-white block font-bold">Sony Alpha 7 IV</span>
                                    <span class="text-[11px] font-mono text-red-500 block">Mirrorless Body Only</span>
                                </div>
                            </td>
                            <td class="p-4 font-mono text-xs text-neutral-400">ILCE-7M4/B</td>
                            <td class="p-4">
                                <span class="bg-neutral-900 text-neutral-200 border border-neutral-800 text-[10px] font-black uppercase px-2 py-1 rounded-lg">
                                    Sony
                                </span>
                            </td>
                            <td class="p-4 font-mono text-sm text-white">$2,499.99</td>
                            <td class="p-4">
                                <div class="space-y-1">
                                    <div class="flex items-center gap-1.5 text-xs font-bold text-neutral-200">
                                        <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                                        18 Units Available
                                    </div>
                                    <div class="w-24 bg-neutral-900 h-1 rounded-full overflow-hidden border border-neutral-800">
                                        <div class="bg-green-500 h-full w-3/4"></div>
                                    </div>
                                </div>
                            </td>
                            <td class="p-4 pr-6 text-right">
                                <div class="flex items-center justify-end gap-2">
                                    <button class="p-2 bg-neutral-900 hover:bg-neutral-800 text-neutral-400 hover:text-white rounded-xl border border-neutral-800 transition-all">
                                        <i data-lucide="edit-3" class="w-4 h-4"></i>
                                    </button>
                                    <button class="p-2 bg-neutral-900 hover:bg-red-600/20 text-neutral-400 hover:text-red-500 rounded-xl border border-neutral-800 hover:border-red-600/30 transition-all">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
