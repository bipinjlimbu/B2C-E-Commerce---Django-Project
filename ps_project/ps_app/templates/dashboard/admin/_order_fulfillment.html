<div class="space-y-6">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
        <div>
            <h2 class="text-xs font-bold uppercase tracking-widest text-neutral-400 mb-1">Orders & Logistics</h2>
            <h1 class="text-2xl font-black text-neutral-900 tracking-tight">Order Fulfillment</h1>
        </div>
        <div class="flex items-center gap-3">
            <div class="bg-black text-white px-4 py-2.5 rounded-xl border border-neutral-800 text-xs font-bold font-mono">
                Awaiting Dispatch: 12
            </div>
        </div>
    </div>

    <div class="bg-black border border-neutral-800 rounded-3xl shadow-2xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-neutral-800 text-[10px] font-bold uppercase tracking-widest text-neutral-400 bg-neutral-950/50">
                        <th class="p-4 pl-6">Order Reference</th>
                        <th class="p-4">Customer</th>
                        <th class="p-4">Purchased Item</th>
                        <th class="p-4">Total Price</th>
                        <th class="p-4">Tracking Node</th>
                        <th class="p-4 pr-6 text-right">Fulfillment System</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-neutral-900 text-sm font-semibold text-neutral-300">
                    {% for i in "x"|rjust:"12" %}
                        <tr class="hover:bg-neutral-900/30 transition-colors">
                            <td class="p-4 pl-6">
                                <span class="text-white block font-mono font-bold text-xs tracking-wider">#PX-94827</span>
                                <span class="text-[10px] text-neutral-500 block">June 22, 2026</span>
                            </td>
                            <td class="p-4">
                                <span class="text-white block font-bold">Bipin Limbu</span>
                                <span class="text-[11px] font-mono text-neutral-500 block">bipin@gmail.com</span>
                            </td>
                            <td class="p-4">
                                <div class="flex items-center gap-2">
                                    <span class="text-white font-bold">Sony Alpha 7 IV</span>
                                    <span class="text-xs font-mono text-red-500 bg-red-500/10 px-1.5 py-0.5 rounded border border-red-500/20">x1</span>
                                </div>
                            </td>
                            <td class="p-4 font-mono text-xs text-white">$2,499.99</td>
                            <td class="p-4">
                                <div class="flex items-center gap-2">
                                    <select class="bg-neutral-900 border border-neutral-800 text-xs font-bold font-mono text-neutral-200 rounded-xl px-3 py-1.5 focus:outline-none focus:border-red-600 transition-colors cursor-pointer">
                                        <option value="pending" selected>Processing</option>
                                        <option value="shipped">In Transit</option>
                                        <option value="delivered">Delivered</option>
                                        <option value="cancelled">Cancelled</option>
                                    </select>
                                </div>
                            </td>
                            <td class="p-4 pr-6 text-right">
                                <div class="flex items-center justify-end gap-2">
                                    <button title="Update Dispatch Logistics" class="p-2 bg-neutral-900 hover:bg-neutral-800 text-neutral-400 hover:text-white rounded-xl border border-neutral-800 transition-all">
                                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                                    </button>
                                    <button title="Print Manifest/Invoice" class="p-2 bg-neutral-900 hover:bg-neutral-800 text-neutral-400 hover:text-white rounded-xl border border-neutral-800 transition-all">
                                        <i data-lucide="printer" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
