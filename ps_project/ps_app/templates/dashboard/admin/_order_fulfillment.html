<div class="space-y-6">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
        <div>
            <h2 class="text-xs font-bold uppercase tracking-widest text-neutral-400 mb-1">Orders & Logistics</h2>
            <h1 class="text-2xl font-black text-neutral-900 tracking-tight uppercase">Order Fulfillment</h1>
        </div>
        <div class="flex items-center gap-3">
            <div class="bg-black text-white px-4 py-2.5 rounded-xl border border-neutral-800 text-xs font-bold font-mono">
                Awaiting Dispatch: 12
            </div>
        </div>
    </div>

    <div class="space-y-4">
        {% for i in "x"|rjust:"12" %}
            <div class="bg-black border border-neutral-800 rounded-2xl p-6 min-h-[140px] flex flex-col lg:flex-row lg:items-center justify-between gap-6 hover:border-neutral-700 transition-all shadow-xl group">
                
                <div class="space-y-4 flex-grow w-full">
                    
                    <div class="flex flex-wrap items-center gap-3">
                        <span class="font-mono font-black text-base text-white">#PX-94827{{ forloop.counter }}</span>
                        
                        <span class="bg-amber-600 text-white font-black h-7 px-3 rounded-lg flex items-center justify-center text-[9px] uppercase tracking-widest select-none">
                            Processing
                        </span>

                        <span class="text-xs text-neutral-500 font-mono">| June 22, 2026</span>
                        <span class="text-xs text-neutral-400 font-medium">| Customer: <strong class="text-white">Bipin Limbu</strong></span>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-w-4xl">
                        
                        <div class="flex items-center gap-3 bg-neutral-950 border border-neutral-800 p-2 rounded-xl">
                            <div class="w-10 h-10 bg-neutral-900 border border-neutral-800 rounded-lg overflow-hidden flex items-center justify-center p-1 shrink-0">
                                <i data-lucide="image" class="w-5 h-5 text-neutral-600"></i>
                            </div>
                            <span class="text-neutral-200 text-xs font-bold tracking-tight truncate flex-grow">
                                Sony Alpha 7 IV 
                                <span class="text-red-500 bg-red-500/10 px-1.5 py-0.5 rounded border border-red-500/20 text-[10px] font-mono font-bold ml-1">x1</span>
                            </span>
                        </div>

                        <div class="flex items-center gap-3 bg-neutral-950 border border-neutral-800 p-2 rounded-xl">
                            <div class="w-10 h-10 bg-neutral-900 border border-neutral-800 rounded-lg overflow-hidden flex items-center justify-center p-1 shrink-0">
                                <i data-lucide="layers" class="w-5 h-5 text-neutral-600"></i>
                            </div>
                            <span class="text-neutral-200 text-xs font-bold tracking-tight truncate flex-grow">
                                Tactical Striker Rig Cover Alpha 
                                <span class="text-red-500 bg-red-500/10 px-1.5 py-0.5 rounded border border-red-500/20 text-[10px] font-mono font-bold ml-1">x{{ forloop.counter }}</span>
                            </span>
                        </div>

                    </div>
                </div>

                <div class="flex flex-wrap sm:flex-nowrap items-center justify-between lg:justify-end gap-6 border-t lg:border-t-0 border-neutral-900 pt-4 lg:pt-0 shrink-0 w-full lg:w-auto">
                    
                    <div class="flex flex-col lg:text-right">
                        <span class="text-[9px] uppercase font-bold tracking-wider text-neutral-500">Total Price</span>
                        <div class="flex items-baseline gap-0.5">
                            <span class="text-xs font-mono font-bold text-neutral-400">$</span>
                            <span class="text-base font-mono font-black text-white">2,499.99</span>
                        </div>
                    </div>

                    <div class="flex items-center gap-2 w-full sm:w-auto justify-end">
                        
                        <button class="bg-neutral-900 hover:bg-neutral-800 border border-neutral-800 text-white font-black h-11 px-5 rounded-xl transition-all flex items-center justify-center gap-2 text-xs uppercase tracking-widest active:scale-95 whitespace-nowrap">
                            <i data-lucide="package-check" class="w-4 h-4 text-red-500"></i>
                            <span>Dispatch Cargo</span>
                        </button>
                        
                        <button title="Print Manifest/Invoice" class="p-2.5 bg-neutral-900 hover:bg-neutral-800 text-neutral-400 hover:text-white h-11 w-11 rounded-xl border border-neutral-800 transition-all flex items-center justify-center active:scale-95 shrink-0">
                            <i data-lucide="printer" class="w-4 h-4"></i>
                        </button>
                    </div>
                    
                </div>

            </div>
        {% endfor %}
    </div>
</div>
