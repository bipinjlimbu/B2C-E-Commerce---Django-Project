<div class="space-y-6">
    <div>
        <h2 class="text-xs font-bold uppercase tracking-widest text-red-600 mb-1">Logistics Trace</h2>
        <p class="text-2xl font-black tracking-tight text-neutral-900 uppercase">Purchase History Matrix</p>
    </div>

    <div class="space-y-4">
        {% for i in "123456789123" %}
            <div class="bg-white border border-neutral-200 rounded-2xl p-6 min-h-[140px] flex flex-col lg:flex-row lg:items-center justify-between gap-6 hover:border-neutral-300 transition-all shadow-sm group">
                
                <div class="space-y-4 flex-grow w-full">
                    
                    <div class="flex flex-wrap items-center gap-3">
                        <span class="font-mono font-black text-base text-neutral-900">#TK-407{{ forloop.counter }}</span>
                        <span class="text-xs text-neutral-400 font-mono">| Registered: 2026-06-25 18:15</span>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-w-4xl">
                        
                        <div class="flex items-center gap-3 bg-neutral-50 border border-neutral-200/60 p-2 rounded-xl">
                            <div class="w-10 h-10 bg-white border border-neutral-200 rounded-lg overflow-hidden flex items-center justify-center p-1 shrink-0">
                                <i data-lucide="camera" class="w-4 h-4 text-neutral-400"></i>
                            </div>
                            <span class="text-neutral-700 text-xs font-black tracking-tight truncate">
                                Sony Alpha 7 IV <span class="text-neutral-400 font-medium ml-1">× 1</span>
                            </span>
                        </div>

                        <div class="flex items-center gap-3 bg-neutral-50 border border-neutral-200/60 p-2 rounded-xl">
                            <div class="w-10 h-10 bg-white border border-neutral-200 rounded-lg overflow-hidden flex items-center justify-center p-1 shrink-0">
                                <i data-lucide="layers" class="w-4 h-4 text-neutral-400"></i>
                            </div>
                            <span class="text-neutral-700 text-xs font-black tracking-tight truncate">
                                FE 24-70mm f/2.8 GM II <span class="text-neutral-400 font-medium ml-1">× {{ forloop.counter }}</span>
                            </span>
                        </div>

                    </div>
                </div>

                <div class="flex items-center justify-between lg:justify-end gap-6 border-t lg:border-t-0 border-neutral-100 pt-4 lg:pt-0 shrink-0 w-full lg:w-auto">
                    
                    <div class="flex flex-col lg:text-right">
                        <span class="text-[9px] uppercase font-bold tracking-wider text-neutral-400">Allocation Total</span>
                        <div class="flex items-baseline gap-0.5">
                            <span class="text-xs font-mono font-bold text-neutral-500">Rs.</span>
                            <span class="text-base font-mono font-black text-neutral-900">1,85,000.00</span>
                        </div>
                    </div>

                    <div class="shrink-0">
                        <div class="bg-green-600 text-white font-black h-10 px-5 rounded-xl flex items-center justify-center text-[10px] uppercase tracking-widest shadow-sm select-none min-w-[110px]">
                            Delivered
                        </div>
                    </div>
                    
                </div>

            </div>
        {% endfor %}
    </div>
</div>
