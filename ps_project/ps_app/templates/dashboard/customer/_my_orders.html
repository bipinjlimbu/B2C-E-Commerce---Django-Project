<div class="space-y-6">
    <div>
        <h2 class="text-xs font-bold uppercase tracking-widest text-red-600 mb-1">Logistics Trace</h2>
        <p class="text-2xl font-black tracking-tight text-neutral-900 uppercase">Purchase History Matrix</p>
    </div>

    <div class="border border-neutral-200 rounded-2xl overflow-hidden bg-white shadow-sm">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-neutral-50 border-b border-neutral-200 text-[10px] font-black uppercase tracking-widest text-neutral-500">
                        <th class="p-4 sm:p-5">Order ID</th>
                        <th class="p-4 sm:p-5">Timestamp</th>
                        <th class="p-4 sm:p-5">Allocation Total</th>
                        <th class="p-4 sm:p-5">Fulfillment Status</th>
                        <th class="p-4 sm:p-5 text-right">Action</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-neutral-100 text-xs font-medium text-neutral-700">
                    {% for i in "123456789123" %}
                        <tr class="hover:bg-neutral-50/80 transition-colors">
                            <td class="p-4 sm:p-5 font-mono font-bold text-neutral-900">#TK-407{{ forloop.counter }}</td>
                            <td class="p-4 sm:p-5 text-neutral-500">2026-06-25 18:15</td>
                            <td class="p-4 sm:p-5 font-mono font-bold text-neutral-900">Rs. 1,85,000.00</td>
                            <td class="p-4 sm:p-5">
                                <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md bg-green-50 border border-green-200 text-green-700 text-[10px] font-black uppercase tracking-wider">
                                    <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> Delivered
                                </span>
                            </td>
                            <td class="p-4 sm:p-5 text-right">
                                <a href="/orders/407{{ forloop.counter }}/" class="inline-flex items-center gap-1 bg-neutral-900 hover:bg-neutral-800 text-white font-black px-3 py-2 rounded-xl text-[10px] uppercase tracking-widest transition-all">
                                    <i data-lucide="eye" class="w-3 h-3"></i> Inspect
                                </a>
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
