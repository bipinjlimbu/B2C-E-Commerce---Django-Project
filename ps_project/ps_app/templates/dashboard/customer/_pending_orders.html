<div class="space-y-6">
    <div>
        <h2 class="text-xs font-bold uppercase tracking-widest text-red-600 mb-1">Active Pipelines</h2>
        <p class="text-2xl font-black tracking-tight text-neutral-900 uppercase">Pending Orders Matrix</p>
    </div>

    <div class="space-y-4">
        {% for i in "123456789123" %}
            <div class="bg-white border border-neutral-200 rounded-2xl p-6 min-h-[140px] flex flex-col lg:flex-row lg:items-center justify-between gap-6 hover:border-neutral-300 transition-all shadow-sm group">
                
                <div class="space-y-4 flex-grow w-full">
                    
                    <div class="flex flex-wrap items-center gap-3">
                        <span class="font-mono font-black text-base text-neutral-900">#TK-902{{ forloop.counter }}</span>
                        
                        <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md bg-amber-50 border border-amber-200 text-amber-700 text-[10px] font-black uppercase tracking-wider animate-pulse">
                            <span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span> Packaging & Prep
                        </span>
                        
                        <span class="text-xs text-neutral-400 font-mono">| Registered: 2026-06-28 17:50</span>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-w-4xl">
                        
                        <div class="flex items-center gap-3 bg-neutral-50 border border-neutral-200/60 p-2 rounded-xl">
                            <div class="w-10 h-10 bg-white border border-neutral-200 rounded-lg overflow-hidden flex items-center justify-center p-1 shrink-0">
                                <i data-lucide="camera" class="w-4 h-4 text-neutral-400"></i>
                            </div>
                            <span class="text-neutral-700 text-xs font-black tracking-tight truncate">
                                Sony Alpha 7 IV <span class="text-neutral-400 font-medium ml-1">× 1</span>
                            </span>
                        </div>

                        <div class="flex items-center gap-3 bg-neutral-50 border border-neutral-200/60 p-2 rounded-xl">
                            <div class="w-10 h-10 bg-white border border-neutral-200 rounded-lg overflow-hidden flex items-center justify-center p-1 shrink-0">
                                <i data-lucide="layers" class="w-4 h-4 text-neutral-400"></i>
                            </div>
                            <span class="text-neutral-700 text-xs font-black tracking-tight truncate">
                                FE 24-70mm f/2.8 GM II <span class="text-neutral-400 font-medium ml-1">× 1</span>
                            </span>
                        </div>

                    </div>
                    </div>

                <div class="flex items-center justify-between lg:justify-end gap-8 border-t lg:border-t-0 border-neutral-100 pt-4 lg:pt-0 shrink-0">
                    <div class="flex flex-col lg:text-right">
                        <span class="text-[9px] uppercase font-bold tracking-wider text-neutral-400">Escrow Value</span>
                        <div class="flex items-baseline gap-0.5">
                            <span class="text-xs font-mono font-bold text-neutral-500">Rs.</span>
                            <span class="text-base font-mono font-black text-neutral-900">3,45,000.00</span>
                        </div>
                    </div>

                    <div class="flex items-center gap-2">
                        <a href="/orders/track/902{{ forloop.counter }}/" class="bg-neutral-900 hover:bg-neutral-800 text-white font-black h-11 px-5 rounded-xl transition-all flex items-center justify-center gap-2 text-xs uppercase tracking-widest shadow-md whitespace-nowrap">
                            <i data-lucide="radar" class="w-3.5 h-3.5 text-red-500"></i>
                            <span>Track Package</span>
                        </a>
                        
                        <button class="bg-neutral-50 hover:bg-red-50 border border-neutral-200 hover:border-red-200 text-neutral-400 hover:text-red-600 h-11 w-11 rounded-xl transition-all flex items-center justify-center active:scale-95" title="Abort Order Pipeline">
                            <i data-lucide="x-circle" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

            </div>
        {% endfor %}
    </div>
</div>
